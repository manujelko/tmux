# setting the prefix from C-b to C-a
set -g prefix C-a

# free the original Ctrl-b prefix keybinding
unbind C-b

# setting the delay between prefix and command
set -s escape-time 1

# set base index for windows to 1 instead of 0
set -g base-index 1

# set the base index for panes to 1 instead of 0
setw -g pane-base-index 1

# reload the file with Prefix r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ensure thatwe can send Ctrl-A to other apps
bind C-a send-prefix

# splitting panes with | and -
bind | split-window -h
bind - split-window -v

# moving between panes with Prefix h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# pane resizing with Prefix H, J, K, L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# mouse support
set -g mouse on

# set the default terminal mode to 256color mode
set -g default-terminal "screen-256color"

# set the status line's colors
set -g status-style fg=white,bg=color236

# set the color of the window list
setw -g window-status-style fg=color247,bg=color236
setw -g window-status-current-style fg=white,bg=color236

# color for pane borders
setw -g pane-border-style fg=color236,bg=black
setw -g pane-active-border-style fg=color236,bg=black

# command/message line
set -g message-style fg=white,bold,bg=color22

# status-line left
set -g status-left-length 40
set -g status-left "#[fg=white][#S]"

# status-line right
set -g status-right "#[fg=white]\"#h\""

# center the window list in the status line
set -g status-justify centre

# update the status line every 60 seconds
set -g status-interval 60

# enable activity alerts
setw -g monitor-activity on
set -g visual-activity on
set -g window-status-activity-style fg=red,bg=color236
