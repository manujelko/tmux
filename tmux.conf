set -a terminal-features "screen-256color:RGB"
set -g base-index 1
set -g renumber-windows on
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g status-right ""
set -g status-left "#[fg=red]* #S#[default]"
set -g status-left-length 50
set -g window-status-current-style "fg=green bold"

setw -g mode-keys vi

bind r source-file "~/.config/tmux/tmux.conf" \; display-message "Reloaded!"
bind f run-shell "tmux neww ~/.config/tmux/sessions.sh"
bind s run-shell "tmux neww ~/.config/tmux/se.sh"
bind e show-environment -g
bind w choose-tree -s
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
